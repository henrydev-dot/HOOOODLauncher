<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0A0A0F"/>
  <!-- hoodie hood -->
  <rect x="3" y="2" width="10" height="2" fill="#CCFF00"/>
  <rect x="2" y="3" width="2" height="6" fill="#CCFF00"/>
  <rect x="12" y="3" width="2" height="6" fill="#CCFF00"/>
  <!-- ears -->
  <rect x="3" y="1" width="2" height="2" fill="#CCFF00"/>
  <rect x="11" y="1" width="2" height="2" fill="#CCFF00"/>
  <!-- face -->
  <rect x="4" y="4" width="8" height="7" fill="#1A1A24"/>
  <!-- eyes -->
  <rect x="5" y="6" width="2" height="2" fill="#CCFF00"/>
  <rect x="9" y="6" width="2" height="2" fill="#CCFF00"/>
  <!-- nose -->
  <rect x="7" y="8" width="2" height="1" fill="#FF4D6D"/>
  <!-- whiskers / mouth -->
  <rect x="6" y="9" width="1" height="1" fill="#CCFF00"/>
